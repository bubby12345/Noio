   YOUTUBE IMPORT FUNCTION (real API call)
════════════════════════════════════════════ */
async function importFromYouTube(apiKey, channelInput) {
  // Accept channel ID or handle (e.g. @churchofgladtidings)
  let channelId = channelInput.trim();

  // helper: fetch with clear network-vs-API error reporting
  async function ytFetch(url) {
    let res;
    try {
      res = await fetch(url);
    } catch (netErr) {
      throw new Error("Network blocked the request. This usually means the browser/sandbox blocked the call, or you're offline. Try opening the dashboard in a normal browser tab, or check the test URL.");
    }
    let d;
    try {
      d = await res.json();
    } catch (_) {
      throw new Error(`YouTube returned a non-JSON response (status ${res.status}). The API may not be enabled yet — wait 2-3 minutes and retry.`);
    }
    if (d.error) throw new Error(d.error.message + (d.error.errors?.[0]?.reason ? ` [${d.error.errors[0].reason}]` : ""));
    return d;
  }

  // If it's a handle (@xxx) or URL, resolve to channelId first
  if (channelId.startsWith("@") || channelId.includes("youtube.com")) {
    const handle = channelId.replace(/.*@/, "@").replace(/[/?].*/, "");
    const d = await ytFetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,statistics,snippet&forHandle=${encodeURIComponent(handle)}&key=${apiKey}`);
    channelId = d.items?.[0]?.id;
    if (!channelId) throw new Error("Channel not found for that handle. Try the channel ID (starts with UC).");
  }

  // Get uploads playlist ID
  const chData = await ytFetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails,statistics,snippet&id=${channelId}&key=${apiKey}`);
  if (!chData.items?.length) throw new Error("No channel found with that ID.");
  const uploadsId = chData.items[0].contentDetails.relatedPlaylists.uploads;
  const channelName = chData.items[0].snippet.title;

  // Get up to 50 most recent videos
  const plData = await ytFetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&key=${apiKey}`);
  const videoIds = plData.items.map(i => i.snippet.resourceId.videoId).join(",");

  // Get video details + stats
  const vidData = await ytFetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,contentDetails,snippet&id=${videoIds}&key=${apiKey}`);
  const imported = vidData.items.map(v => ({
    id: "yt_" + v.id,
    platform: "YouTube",
    type: "Unclassified",
    title: v.snippet.title,
    url: `https://www.youtube.com/watch?v=${v.id}`,
    thumbnail: v.snippet.thumbnails?.high?.url || v.snippet.thumbnails?.medium?.url || "",
    date: v.snippet.publishedAt?.split("T")[0] || "",
    dur: parseISO(v.contentDetails.duration),
    views: parseInt(v.statistics.viewCount || 0),
    likes: parseInt(v.statistics.likeCount || 0),
    comments: parseInt(v.statistics.commentCount || 0),
    shares: 0,
    wt: 0,
    day: new Date(v.snippet.publishedAt || "").getDay(),
    hour: 12,
    ret: [],
    aiAnalysis: null,
    imported: true
  }));
  return {
    videos: imported,
    channelName
  };
}
